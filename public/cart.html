<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportscart | Cart</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <header>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="/index.html">Sportscart</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="/index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/products.html">Products</a></li>
            <li class="nav-item"><a class="nav-link" href="/about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="/contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link active" href="/cart.html">Cart</a></li>
            <li class="nav-item"><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="/settings.html">Settings</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="section">
    <div class="container">
      <div class="section-header">
        <h1 class="section-title">Shopping Cart</h1>
        <p class="section-subtitle">Review your selected items before checkout.</p>
      </div>

      <div class="cart-layout">
        <div id="cartItems" class="cart-items"></div>

        <aside class="cart-summary">
          <h3>Order Summary</h3>

          <div class="summary-row">
            <span>Subtotal</span>
            <strong>€<span id="cartSubtotal">0.00</span></strong>
          </div>

          <div class="summary-row">
            <span>Delivery</span>
            <span>Free</span>
          </div>

          <div class="summary-row total-row">
            <span>Total</span>
            <strong>€<span id="cartTotal">0.00</span></strong>
          </div>

          <button class="btn btn-primary checkout-btn">Proceed to Checkout</button>
          <a href="/products.html" class="btn btn-outline-primary continue-btn">Continue Shopping</a>
        </aside>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/cart.js"></script>
</body>
</html>
