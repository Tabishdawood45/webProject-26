<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportscart | Contact</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="/index.html">Sportscart</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/index.html">Home</a>
        <a class="nav-link" href="/products.html">Products</a>
        <a class="nav-link active" href="/contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7">
        <div class="card shadow border-0">
          <div class="card-body p-4">
            <h2 class="mb-3">Contact / Feedback Form</h2>
            <p class="text-muted">Send us your feedback, questions, or report any issue.</p>

            <form id="feedbackForm">
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" id="name" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea id="message" class="form-control" rows="5" required></textarea>
              </div>

              <button type="submit" class="btn btn-primary">Send Feedback</button>
            </form>

            <div id="responseMessage" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/contact.js"></script>
</body>
</html>
