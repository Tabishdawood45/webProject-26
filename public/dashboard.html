<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportscart | Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="/index.html">Sportscart</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item">
              <a class="nav-link" href="/index.html">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/products.html">Products</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/about.html">About</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/contact.html">Contact</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/cart.html">Cart</a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="/dashboard.html">Dashboard</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/settings.html">Settings</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="section">
    <div class="container">
      <h1 class="section-title">Dashboard</h1>
      <p class="section-subtitle">Track your orders and manage store activities.</p>

      <section style="margin-bottom: 36px;">
        <h2>Your Orders</h2>
        <div id="ordersList"></div>
      </section>

      <section id="adminSection" class="hidden">
        <h2>Admin Dashboard</h2>

        <div id="adminStats" class="dashboard-stats-grid" style="margin: 24px 0;"></div>

        <section class="grid grid-2" style="margin-bottom: 28px;">
          <div class="form-card">
            <h3>Create or Edit Product</h3>
            <div id="productAlert" class="hidden"></div>

            <form id="productForm">
              <input type="hidden" id="productId">

              <div class="form-group">
                <label for="productName">Name</label>
                <input id="productName" type="text" required>
              </div>

              <div class="form-group">
                <label for="productCategory">Category</label>
                <input id="productCategory" type="text" required>
              </div>

              <div class="form-group">
                <label for="productPrice">Price</label>
                <input id="productPrice" type="number" step="0.01" required>
              </div>

              <div class="form-group">
                <label for="productStock">Stock</label>
                <input id="productStock" type="number" required>
              </div>

              <div class="form-group">
                <label for="productImage">Image URL</label>
                <input id="productImage" type="text">
              </div>

              <div class="form-group">
                <label for="productDescription">Description</label>
                <textarea id="productDescription" rows="4" required></textarea>
              </div>

              <button class="btn btn-primary" type="submit">Save Product</button>
            </form>
          </div>

          <div class="form-card">
            <h3>Product Management</h3>
            <div id="productAdminList"></div>
          </div>
        </section>

        <section style="margin-bottom: 28px;">
          <div class="form-card">
            <h3>All Orders</h3>
            <div id="adminOrdersList"></div>
          </div>
        </section>
      </section>
    </div>
  </main>

  <footer>
  <div class="container text-center">Sportscart © 2026</div>
</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
