<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportscart | Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container navbar">
      <a class="brand" href="/index.html">Sportscart</a>
      <nav class="nav-links">
        <a href="/products.html">Products</a>
        <a href="/about.html">About</a>
        <a href="/contact.html">Contact</a>
        <a href="/cart.html" data-auth>Cart</a>
        <a href="/dashboard.html" data-auth>Dashboard</a>
        <span id="navWelcome"></span>
        <button data-auth data-logout>Logout</button>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <h1 class="section-title">User dashboard</h1>
      <p class="section-subtitle">Users can track their own orders. Admin can also manage products and feedback.</p>

      <section style="margin-bottom: 36px;">
        <h2>Your orders</h2>
        <div id="ordersList"></div>
      </section>

      <section id="adminSection" class="hidden">
        <h2>Admin area</h2>
        <div class="stats" id="adminStats"></div>

        <div class="page-grid section" style="padding-left: 0; padding-right: 0;">
          <div class="form-card">
            <h3>Create or edit product</h3>
            <div id="productAlert" class="alert"></div>
            <form id="productForm">
              <input type="hidden" id="productId">
              <div class="form-group"><label for="productName">Name</label><input id="productName" required></div>
              <div class="form-group"><label for="productCategory">Category</label><input id="productCategory" required></div>
              <div class="form-group"><label for="productPrice">Price</label><input id="productPrice" type="number" step="0.01" required></div>
              <div class="form-group"><label for="productStock">Stock</label><input id="productStock" type="number" required></div>
              <div class="form-group"><label for="productImage">Image URL</label><input id="productImage"></div>
              <div class="form-group"><label for="productDescription">Description</label><textarea id="productDescription" rows="4" required></textarea></div>
              <button class="btn btn-primary" type="submit">Save product</button>
            </form>
          </div>

          <div>
            <div class="form-card" style="margin-bottom: 22px;">
              <h3>Product management</h3>
              <div id="productAdminList"></div>
            </div>
            <div class="form-card">
              <h3>User feedback</h3>
              <div id="feedbackList"></div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer><div class="container">Sportscart dashboard page</div></footer>

  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
