<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportscart | Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="index.html">Sportscart</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html" data-auth>Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="dashboard.html" data-auth>Dashboard</a></li>
          <li class="nav-item"><span class="nav-link" id="navWelcome"></span></li>
          <li class="nav-item"><a class="btn btn-outline-primary btn-sm" href="login.html" data-guest>Login</a></li>
          <li class="nav-item"><a class="btn btn-primary btn-sm" href="signup.html" data-guest>Sign up</a></li>
          <li class="nav-item"><button class="btn btn-danger btn-sm" data-auth data-logout>Logout</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <div id="productView" class="mb-5"></div>

      <section class="mt-5">
        <h2 class="fw-bold mb-2">Reviews and likes</h2>
        <p class="text-muted mb-4">
          Users can add reviews, like reviews, and edit their own comment.
        </p>

        <div class="card shadow-sm border-0 mb-4">
          <div class="card-body">
            <h3 class="h5 fw-bold mb-3">Add or edit your review</h3>

            <div id="reviewAlert"></div>

            <form id="reviewForm">
              <input type="hidden" id="reviewId">

              <div class="mb-3">
                <label for="rating" class="form-label">Rating</label>
                <select id="rating" class="form-select" required>
                  <option value="5">5 - Excellent</option>
                  <option value="4">4 - Very good</option>
                  <option value="3">3 - Good</option>
                  <option value="2">2 - Fair</option>
                  <option value="1">1 - Poor</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="comment" class="form-label">Comment</label>
                <textarea id="comment" class="form-control" rows="4" required></textarea>
              </div>

              <button class="btn btn-primary" type="submit">Save review</button>
            </form>
          </div>
        </div>

        <div id="reviewsList"></div>
      </section>
    </div>
  </main>

  <footer class="bg-dark text-white py-4">
    <div class="container text-center">Sportscart product page</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="./js/product.js"></script>
  <script src="./js/reviews.js"></script>
</body>
</html>
