<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportscart | Product</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header>
    <div class="container navbar">
      <a class="brand" href="/index.html">Sportscart</a>

      <nav class="nav-links">
        <a href="/index.html">Home</a>
        <a href="/products.html" class="active-link">Products</a>
        <a href="/about.html">About</a>
        <a href="/contact.html">Contact</a>

        <a href="/cart.html" id="navCart" class="hidden">Cart</a>
        <a href="/dashboard.html" id="navDashboard" class="hidden">Dashboard</a>

        <span id="navWelcome"></span>

        <a href="/login.html" id="navLogin">Login</a>
        <a href="/signup.html" id="navSignup" class="btn btn-primary">Sign up</a>
        <button id="navLogout" class="btn btn-danger hidden" type="button">Logout</button>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div id="productView" class="mb-5"></div>

      <section style="margin-top: 48px;">
        <div class="section-header">
          <h2 class="section-title" style="font-size: 1.8rem;">Reviews and Likes</h2>
          <p class="section-subtitle">
            Users can add reviews, like reviews, and edit their own comment.
          </p>
        </div>

        <div class="form-card review-form-card">
          <h3 style="margin-top: 0;">Add or Edit Your Review</h3>

          <div id="reviewAlert"></div>

          <form id="reviewForm">
            <input type="hidden" id="reviewId">

            <div class="form-group">
              <label for="rating">Rating</label>
              <select id="rating" required>
                <option value="5">5 - Excellent</option>
                <option value="4">4 - Very good</option>
                <option value="3">3 - Good</option>
                <option value="2">2 - Fair</option>
                <option value="1">1 - Poor</option>
              </select>
            </div>

            <div class="form-group">
              <label for="comment">Comment</label>
              <textarea id="comment" rows="4" required></textarea>
            </div>

            <button class="btn btn-primary" type="submit">Save Review</button>
          </form>
        </div>

        <div id="reviewsList"></div>
      </section>
    </div>
  </main>

  <footer>
    <div class="container center">Sportscart product page</div>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/product.js"></script>
  <script src="/js/reviews.js"></script>
</body>
</html>
