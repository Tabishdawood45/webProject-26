<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportscart | Product</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="/index.html">Sportscart</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="/index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link active" href="/products.html">Products</a></li>
            <li class="nav-item"><a class="nav-link" href="/about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="/contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link" href="/cart.html">Cart</a></li>
            <li class="nav-item"><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="/settings.html">Settings</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="section">
    <div class="container">
      <div id="productView" class="mb-5"></div>

      <section style="margin-top: 48px;">
        <div class="section-header">
          <h2 class="section-title" style="font-size: 1.8rem;">Reviews and Likes</h2>
          <p class="section-subtitle">
            Users can add reviews, like reviews, and edit their own comment.
          </p>
        </div>

        <div class="form-card review-form-card">
          <h3 style="margin-top: 0;">Add or Edit Your Review</h3>

          <div id="reviewAlert"></div>

          <form id="reviewForm">
            <input type="hidden" id="reviewId">

            <div class="form-group">
              <label for="rating">Rating</label>
              <select id="rating" required>
                <option value="5">5 - Excellent</option>
                <option value="4">4 - Very good</option>
                <option value="3">3 - Good</option>
                <option value="2">2 - Fair</option>
                <option value="1">1 - Poor</option>
              </select>
            </div>

            <div class="form-group">
              <label for="comment">Comment</label>
              <textarea id="comment" rows="4" required></textarea>
            </div>

            <button class="btn btn-primary" type="submit">Save Review</button>
          </form>
        </div>

        <div id="reviewsList"></div>
      </section>
    </div>
  </main>

  <footer>
    <div class="container center">Sportscart product page</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/product.js"></script>
  <script src="/js/reviews.js"></script>
</body>
</html>
