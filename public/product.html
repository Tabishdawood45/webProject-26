<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportscart | Product</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container navbar">
      <a class="brand" href="/index.html">Sportscart</a>
      <nav class="nav-links">
        <a href="/products.html">Products</a>
        <a href="/about.html">About</a>
        <a href="/contact.html">Contact</a>
        <a href="/cart.html" data-auth>Cart</a>
        <a href="/dashboard.html" data-auth>Dashboard</a>
        <span id="navWelcome"></span>
        <a href="/login.html" data-guest>Login</a>
        <a href="/signup.html" data-guest>Sign up</a>
        <button data-auth data-logout>Logout</button>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div id="productView" class="product-page"></div>

      <section class="section product-review-section">
        <h2 class="section-title">Reviews and likes</h2>
        <p class="section-subtitle">
          Users can add reviews, like reviews, and manage their own review.
        </p>

        <div class="form-card review-form-card">
          <h3>Add or edit your review</h3>
          <div id="reviewAlert" class="alert"></div>

          <form id="reviewForm">
            <input type="hidden" id="reviewId">

            <div class="form-group">
              <label for="rating">Rating</label>
              <select id="rating" required>
                <option value="5">5 - Excellent</option>
                <option value="4">4 - Very good</option>
                <option value="3">3 - Good</option>
                <option value="2">2 - Fair</option>
                <option value="1">1 - Poor</option>
              </select>
            </div>

            <div class="form-group">
              <label for="comment">Comment</label>
              <textarea id="comment" rows="4" required></textarea>
            </div>

            <button class="btn btn-primary" type="submit">Save review</button>
          </form>
        </div>

        <div id="reviewsList" class="reviews-list"></div>
      </section>
    </div>
  </main>

  <footer>
    <div class="container">Sportscart product page</div>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/product.js"></script>
</body>
</html>
