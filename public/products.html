<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportscart | Products</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="/index.html">Sportscart</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="/index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link active" href="/products.html">Products</a></li>
            <li class="nav-item"><a class="nav-link" href="/about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="/contact.html">Contact</a></li>

            <li class="nav-item">
              <a class="nav-link d-none" href="/cart.html" data-auth>Cart</a>
            </li>
            <li class="nav-item">
              <a class="nav-link d-none" href="/dashboard.html" data-auth>Dashboard</a>
            </li>

            <li class="nav-item">
              <span class="nav-link fw-semibold text-primary" id="navWelcome"></span>
            </li>

            <li class="nav-item">
              <a class="btn btn-outline-primary btn-sm" href="/login.html" data-guest>Login</a>
            </li>
            <li class="nav-item">
              <a class="btn btn-primary btn-sm" href="/signup.html" data-guest>Sign up</a>
            </li>
            <li class="nav-item">
              <button class="btn btn-danger btn-sm d-none" data-auth data-logout type="button">Logout</button>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <section class="section" style="padding-bottom: 20px;">
    <div class="container center">
      <h1 class="section-title">All Sports Products</h1>
      <p class="section-subtitle">Browse all available products in Sportscart.</p>
    </div>
  </section>

  <main class="section" style="padding-top: 10px;">
    <div class="container">
      <div style="max-width: 680px; margin: 0 auto 32px;">
        <div class="form-card">
          <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <input
              type="text"
              id="searchInput"
              class="form-control"
              placeholder="Search by product name, category, or rating"
              style="flex: 1;"
            >
            <button class="btn btn-primary" id="searchBtn" type="button">Search</button>
          </div>
        </div>
      </div>

      <div class="grid grid-3" id="productsList"></div>
    </div>
  </main>

  <footer>
    <div class="container center">Sportscart products page</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/products.js"></script>
  <script src="/js/search.js"></script>
</body>
</html>
