<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportscart | Products</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="index.html">Sportscart</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html" data-auth>Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="dashboard.html" data-auth>Dashboard</a></li>
          <li class="nav-item"><span class="nav-link" id="navWelcome"></span></li>
          <li class="nav-item"><a class="btn btn-outline-primary btn-sm" href="login.html" data-guest>Login</a></li>
          <li class="nav-item"><a class="btn btn-primary btn-sm" href="signup.html" data-guest>Sign up</a></li>
          <li class="nav-item"><button class="btn btn-danger btn-sm" data-auth data-logout>Logout</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <section class="py-5 bg-light border-bottom">
    <div class="container text-center">
      <h1 class="fw-bold">All Sports Products</h1>
      <p class="text-muted mb-0">Browse all available products in Sportscart.</p>
    </div>
  </section>

  <!-- PRODUCTS -->
  <main class="py-5">
    <div class="container">

      <!-- SEARCH BAR -->
      <div class="row mb-4">
        <div class="col-md-8 col-lg-6 mx-auto">
          <div class="input-group shadow-sm">
           
            <input
              type="text"
              id="searchInput"
              class="form-control"
              placeholder="Search by product name category or rating"
            >
            <button class="btn btn-primary" id="searchBtn">Search</button>
          </div>
        </div>
      </div>

      <!-- PRODUCTS LIST -->
      <div class="row g-4" id="productsList"></div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-dark text-white py-4">
    <div class="container text-center">
      Sportscart products page
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/products.js"></script>
  <script src="./js/search.js"></script>
</body>
</html>
