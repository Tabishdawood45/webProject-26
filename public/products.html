<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportscart | Products</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <header>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="./index.html">Sportscart</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="./index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link active" href="./products.html">Products</a></li>
            <li class="nav-item"><a class="nav-link" href="./about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="./contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link" href="./cart.html">Cart</a></li>
            <li class="nav-item"><a class="nav-link" href="./dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="./settings.html">Settings</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <section class="products-hero-modern">
    <div class="container text-center">
      <h1 class="products-title">Explore Sports Products</h1>
      <p class="products-subtitle">
        Find the right gear for your game, training and lifestyle.
      </p>

      <div class="search-modern">
        <input
          type="text"
          id="searchInput"
          class="search-input-modern"
          placeholder="Search products by names or categories"
        >
        <button class="search-btn-modern" id="searchBtn" type="button">
          Search
        </button>
      </div>
    </div>
  </section>

  <main class="section pt-4">
    <div class="container">
      <div class="grid grid-3" id="productsList"></div>
    </div>
  </main>

     <footer>    
  <div class="container text-center">Sportscart © 2026</div>
</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/products.js"></script>
  <script src="./js/search.js"></script>
</body>
</html>
