<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportscart | Sign up</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container navbar">
      <a class="brand" href="/index.html">Sportscart</a>
      <nav class="nav-links">
        <a href="/products.html">Products</a>
        <a href="/about.html">About</a>
        <a href="/contact.html">Contact</a>
        <a href="/login.html">Login</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container auth-layout">
      <div class="form-card">
        <h1>Create account</h1>
        <p class="section-subtitle">New users can register and start shopping.</p>
        <div id="formAlert" class="alert"></div>
        <form id="signupForm">
          <div class="form-group">
            <label for="fullName">Full name</label>
            <input type="text" id="fullName" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required minlength="6">
          </div>
          <button class="btn btn-primary" type="submit">Sign up</button>
        </form>
      </div>

      <div class="hero-card">
        <h3>Features users unlock after signup</h3>
        <ul>
          <li>Add products to cart</li>
          <li>Place orders</li>
          <li>Write reviews</li>
          <li>Like reviews</li>
          <li>See own order history</li>
        </ul>
      </div>
    </div>
  </main>

  <footer><div class="container">Sportscart signup page</div></footer>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
