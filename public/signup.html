<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportscart | Sign Up</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="/index.html">Sportscart</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="/index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/products.html">Products</a></li>
            <li class="nav-item"><a class="nav-link" href="/about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="/contact.html">Contact</a></li>

            <li class="nav-item">
              <a class="nav-link d-none" href="/cart.html" data-auth>Cart</a>
            </li>
            <li class="nav-item">
              <a class="nav-link d-none" href="/dashboard.html" data-auth>Dashboard</a>
            </li>

            <li class="nav-item">
              <span class="nav-link fw-semibold text-primary" id="navWelcome"></span>
            </li>
            <li class="nav-item">
              <button class="btn btn-danger btn-sm d-none" data-auth data-logout type="button">Logout</button>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="section">
    <div class="container">
      <div style="max-width: 520px; margin: 0 auto;">
        <div class="form-card">
          <h1 class="section-title center">Create Account</h1>
          <p class="section-subtitle center">Sign up to shop and manage your orders.</p>

          <form id="signupForm">
            <div class="form-group">
              <label for="full_name">Full name</label>
              <input type="text" id="full_name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
              <label for="email">Email address</label>
              <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" placeholder="Create a password" required>
            </div>

            <button class="btn btn-primary" type="submit" style="width: 100%;">Sign Up</button>
          </form>

          <p class="center" style="margin-top: 18px;">
            Already have an account?
            <a href="/login.html" style="color: var(--primary); font-weight: 700;">Login</a>
          </p>

          <div id="message" class="mt-3 text-center"></div>
        </div>
      </div>
    </div>
  </main>

  
  <footer>
  <div class="container text-center">Sportscart © 2026</div>
</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/signup.js"></script>
</body>
</html>
