<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportscart | Cart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container navbar">
      <a class="brand" href="/index.html">Sportscart</a>
      <nav class="nav-links">
        <a href="/products.html">Products</a>
        <a href="/about.html">About</a>
        <a href="/contact.html">Contact</a>
        <a href="/cart.html" data-auth>Cart</a>
        <a href="/dashboard.html" data-auth>Dashboard</a>
        <span id="navWelcome"></span>
        <button data-auth data-logout>Logout</button>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container page-grid">
      <section>
        <h1 class="section-title">Your cart</h1>
        <div id="cartItems"></div>
      </section>
      <aside class="form-card">
        <h2>Order summary</h2>
        <p class="small">This project uses simulated checkout without online payment.</p>
        <div class="space-between"><span>Total</span><strong id="cartTotal">€0.00</strong></div>
        <button class="btn btn-primary" id="checkoutBtn" style="margin-top: 18px; width: 100%;">Place order</button>
      </aside>
    </div>
  </main>

  <footer><div class="container">Sportscart cart page</div></footer>

  <script src="/js/app.js"></script>
  <script src="/js/cart.js"></script>
</body>
</html>
